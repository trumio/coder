name: content-studio-be-cd-prod
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deployment-Release"]
    # branches: [uat]
    types:
      - completed

permissions:
  id-token: write
  contents: write

env:
  IMAGE_NAME: content_studio_be

jobs:
  content-studio-cd-prod:
    runs-on: ${{ vars.RUNNER }}
    concurrency: release

    steps:
    - name: Access Repository Tag Variable
      run: |
        TAG=${{ vars.TAG }}
        echo "Using tag from repository variable: $TAG"
        echo "TAG=$TAG" >> "$GITHUB_ENV"
        ENV=${{ vars.ENVIRONMENT }}
        echo "Using env from repository variable: $ENV"
        echo "ENV=$ENV" >> "$GITHUB_ENV"

  # Checkout the branch
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ vars.BRANCH }}
        submodules: true
        token: ${{ secrets.TAG_TOKEN }}

    - name: Set manifest folder names
      run: |
         if [[ "${{ vars.ENVIRONMENT }}" == "uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat-auto"  || "${{ vars.ENVIRONMENT }}" == "tru-test" ]]; then
            echo "FOLDER=uat" >> $GITHUB_ENV
         else
            echo "FOLDER=prod" >> $GITHUB_ENV
         fi

  ## Sharepoint tasks
    - name: Get SharePoint Access Token
      id: get_token
      env:
        CLIENT_ID: ${{ secrets.ENV_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.ENV_CLIENT_SECRET }}
        TENANT_ID: ${{ secrets.ENV_TENANT_ID }}
        SITENAME: Trumio-env
      run: |
          response=$(curl -X POST -H "Content-Type: application/x-www-form-urlencoded" -d "client_id=${{ env.CLIENT_ID }}&client_secret=${{ env.CLIENT_SECRET }}&grant_type=client_credentials&resource=https://graph.microsoft.com" "https://login.microsoftonline.com/${{ env.TENANT_ID }}/oauth2/token")
          echo "token=$(echo $response | jq -r '.access_token')" >> $GITHUB_ENV

    - name: Retrieve Site ID
      id: get_site_id
      run: |
          site_response=$(curl -H "Authorization: Bearer ${{ env.token }}" \
          "https://graph.microsoft.com/v1.0/sites?search=${{ env.SITENAME }}")
          echo "site_id=trumio.sharepoint.com,0702a39f-d261-4be5-b3d4-76525995bc85,b3578a0e-9132-47da-bf61-cc572bf23ced" >> $GITHUB_ENV

    - name: Set SharePoint File Name Based on Tag
      run: |
        case "$ENV" in
          prod)
            FILENAME="env-prod.txt"
            NAMESPACE="prod"
            SUBFOLDER="cm-prod"
            ;;
          tru-prod)
            FILENAME="env-tru-prod.txt"
            NAMESPACE="tru-prod"
            SUBFOLDER="cm-tru-prod"
            ;;
          tru-mphasis)
            FILENAME="env-tru-mphasis.txt"
            NAMESPACE="tru-mphasis"
            SUBFOLDER="cm-tru-mphasis"
            ;;
          tru-ust)
            FILENAME="env-tru-ust.txt"
            NAMESPACE="tru-ust"
            SUBFOLDER="cm-tru-ust"
            ;;
          *)
            echo "Error: Unknown ENV value: $ENV"
            exit 1
            ;;
        esac
        # Export them
        echo "FILENAME=$FILENAME" >> $GITHUB_ENV
        echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
        echo "SUBFOLDER=$SUBFOLDER" >> $GITHUB_ENV
    - name: Fetch Download URL from SharePoint
      id: get_download_url
      run: |
          file_response=$(curl -H "Authorization: Bearer ${{ env.token }}" \
          "https://graph.microsoft.com/v1.0/sites/${{ env.site_id }}/drive/root:/${{ env.FOLDER }}/${{ env.SUBFOLDER }}/${{ env.FILENAME }}")
          echo "File response: $file_response"
          download_url=$(echo $file_response | jq -r '."@microsoft.graph.downloadUrl"')
          echo "Download URL: $download_url"
          echo "download_url=$download_url" >> $GITHUB_ENV

    - name: Display Download URL
      run: |
          echo "Download URL:"
          echo "${{ env.download_url }}"

    - name: Download File from SharePoint
      run: |
          if [ -z "${{ env.download_url }}" ]; then
            echo "Error: Download URL is empty"
            exit 1
          fi
          curl -L "${{ env.download_url }}" --output secrets.txt
          echo "File downloaded successfully."


    ########################## Keyvault-update ####################################

    - name: Install Azure cli
      run: |
            sudo apt-get install ca-certificates curl apt-transport-https lsb-release
            curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg > /dev/null
            AZ_REPO=$(lsb_release -cs)
            echo "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ $AZ_REPO main" | sudo tee /etc/apt/sources.list.d/azure-cli.list
            sudo apt-get update
            sudo apt-get install azure-cli

    - name: Set Azure environment
      id: azure
      run: |
          if [[ "${{ vars.ENVIRONMENT }}" == "uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat-auto"  || "${{ vars.ENVIRONMENT }}" == "tru-test" ]]; then
              echo "azure_clientid=${{ secrets.AZURE_CLIENT_ID_UAT }}" >> $GITHUB_ENV
              echo "azure_tenantid=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
              echo "azure_subscriptionid=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
              echo "azure_clientsecret=${{ secrets.AZURE_CLIENT_SECRET_UAT }}" >> $GITHUB_ENV
          else
              echo "azure_clientid=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
              echo "azure_tenantid=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
              echo "azure_subscriptionid=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
              echo "azure_clientsecret=${{ secrets.AZURE_CLIENT_SECRET }}" >> $GITHUB_ENV
          fi
      shell: bash

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ env.azure_clientid }}","clientSecret":"${{ env.azure_clientsecret }}","subscriptionId":"${{ env.azure_subscriptionid }}","tenantId":"${{ env.azure_tenantid }}"}'

    - name: Azure Keyvault
      id: keyvault
      run: |
          if [[ "${{ vars.ENVIRONMENT }}" == "uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat-auto"  || "${{ vars.ENVIRONMENT }}" == "tru-test" ]]; then
              echo "rg_name=${{ vars.UAT_RG }}" >> $GITHUB_ENV
              echo "aks_name=${{ vars.UAT_AKS }}" >> $GITHUB_ENV
              echo "keyvault_name=${{ vars.UAT_AKV }}" >> $GITHUB_ENV
              echo "secret_name=${{ vars.UAT_AKV_SEC }}" >> $GITHUB_ENV
          else
              echo "rg_name=${{ vars.PROD_RG }}" >> $GITHUB_ENV
              echo "aks_name=${{ vars.PROD_AKS}}" >> $GITHUB_ENV
              echo "keyvault_name=${{ vars.PROD_AKV }}" >> $GITHUB_ENV
              echo "secret_name=${{ vars.PROD_AKV_SEC }}" >> $GITHUB_ENV
          fi

    - name: Update Key Vault Secret
      run: |
            az keyvault secret set --vault-name ${{ env.keyvault_name }} --name ${{ env.secret_name }} --value '${{ github.workspace }}/secrets.txt'

  ########################## Cluster Deployment ####################################

    - name: ACR Environment
      id: acr
      run: |
            echo "registry_url=${{ secrets.UAT_REGISTRY_URL }}" >> $GITHUB_ENV
            echo "registry_username=${{ secrets.UAT_REGISTRY_USERNAME }}" >> $GITHUB_ENV
            echo "registry_password=${{ secrets.UAT_REGISTRY_PASSWORD }}" >> $GITHUB_ENV

    - name: Set nodeSelector value
      run: |
        case "${{ vars.ENVIRONMENT }}" in
          tru-prod|tru-wipro|tru-lti|tru-app-wipro|tru-ust)
            echo "WORKLOAD=tru-wipro" >> $GITHUB_ENV
            ;;
          tru-mphasis)
            echo "WORKLOAD=tru-mphasis" >> $GITHUB_ENV
            ;;
          tru-uat|tru-uat-auto)
            echo "WORKLOAD=tru-uat" >> $GITHUB_ENV
            ;;
          prod)
            echo "WORKLOAD=application" >> $GITHUB_ENV
            ;;
          uat)
            echo "WORKLOAD=uat" >> $GITHUB_ENV
            ;;
          *)
            echo "Unknown environment: ${{ vars.ENVIRONMENT }}"
            exit 1
            ;;
        esac

# Update Image, namespace and nodeSelector using yaml-update-action
    - name: Update deployment yml with multiple fields
      uses: fjogeleit/yaml-update-action@main
      with:
        valueFile: 'manifests/${{ env.FOLDER }}/deployment_cont_std_be.yml'
        branch: ${{ vars.BRANCH }}
        targetBranch: ${{ vars.BRANCH }}
        commitUserName: infant-tr
        commitUserEmail: infant.rex@trumio.ai
        token: ${{ secrets.TAG_TOKEN }}
        description: 'Update deployment properties'
        message: 'Update deployment configurations'
        title: 'Deployment Config Updates'
        changes: |
          {
            "spec.template.spec.containers[0].image": "${{ env.registry_url }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}",
            "metadata.namespace": "${{ env.NAMESPACE }}",
            "spec.template.spec.nodeSelector.workload": "${{ vars.WORKLOAD }}"
          }

    - name: GitHub reference propagation
      run: sleep 10
      shell: bash
      
    - name: Update namespace using yaml-update-action
      uses: fjogeleit/yaml-update-action@main
      with:
          valueFile: 'manifests/${{ env.FOLDER }}/service_cont_std_be.yaml'
          propertyPath: 'metadata.namespace'
          value: ${{ env.NAMESPACE }}
          branch: ${{ vars.BRANCH }}
          targetBranch: ${{ vars.BRANCH }}
          commitUserName: infant-tr
          commitUserEmail: infant.rex@trumio.ai
          token: ${{ secrets.TAG_TOKEN }}

    - run: |
          cat manifests/${{ env.FOLDER }}/deployment_cont_std_be.yml
   # Set the target AKS cluster.
    - uses: azure/aks-set-context@v4
      with:
        cluster-name: ${{ env.aks_name }}
        resource-group: ${{ env.rg_name }}

    #install kubectl on container (runner)
    - uses: azure/setup-kubectl@v4
      with:
        version: 'v1.28.2' # default is latest stable
      id: install

    # to access ACR from runner
    - uses: Azure/k8s-create-secret@v4
      with:
        container-registry-url: ${{ env.registry_url }}
        container-registry-username: ${{ env.registry_username }}
        container-registry-password: ${{ env.registry_password }}
        secret-name: k8s-secret

    - name: Set secret name
      run: |
         if [[ "${{ vars.ENVIRONMENT }}" == "uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat" || "${{ vars.ENVIRONMENT }}" == "tru-uat-auto" ]]; then
            echo "secret=trumio-uat-vault" >> $GITHUB_ENV
         else
            echo "secret=trumio-vault-prod" >> $GITHUB_ENV
         fi

    # K8s secret
    - name: K8s secret
      run: |
          kubectl create secret generic ${{ env.secret }} --from-env-file=secrets.txt --dry-run=client -o yaml | kubectl apply -f - -n ${{ env.NAMESPACE }}
      # echo "${{ secrets.ENV_UAT }}" > secrets.txt

    - name: Secret time-lapse
      run: sleep 30s
      shell: bash

    ##to deploy on AKS
    - uses: Azure/k8s-deploy@v5
      with:
        action: deploy
        namespace: '${{ env.NAMESPACE }}'
        manifests: |
          manifests/${{ env.FOLDER }}/deployment_cont_std_be.yml
          manifests/${{ env.FOLDER }}/service_cont_std_be.yaml

    ##Docker Logout
    - name: docker logout
      run: |
            docker logout ${{ env.registry_url }}

  Notify_Teams:
    needs: content-studio-cd-prod
    runs-on: ubuntu-latest
    if: always()
    env:
      WEBHOOK: ${{ secrets.TEAMS_WORKFLOW_WEBHOOK }}
      FINAL_STATUS: ${{ needs.content-studio-cd-prod.result }}
      PREVIOUS_JOB_NAME: content-studio-cd-prod
    steps:
      - name: Set color variable
        run: |
          echo "Detected FINAL_STATUS='$FINAL_STATUS'"
          FINAL_STATUS_UPPER=$(echo "$FINAL_STATUS" | tr '[:lower:]' '[:upper:]')
          echo "FINAL_STATUS_UPPER=$FINAL_STATUS_UPPER" >> $GITHUB_ENV
          echo "Target env is :${{ vars.ENVIRONMENT }}"


          if [ "$FINAL_STATUS" = "success" ]; then
            echo "COLOR=good" >> $GITHUB_ENV
            echo "EMOJI=✅" >> $GITHUB_ENV
          elif [ "$FINAL_STATUS" = "failure" ]; then
            echo "COLOR=attention" >> $GITHUB_ENV
            echo "EMOJI=❌" >> $GITHUB_ENV
          else
            echo "COLOR=warning" >> $GITHUB_ENV
            echo "EMOJI=⚠️" >> $GITHUB_ENV
          fi
          echo "STATUS='$STATUS'"
          echo "Mapped FINAL_STATUS_UPPER=$FINAL_STATUS_UPPER COLOR=$COLOR EMOJI=$EMOJI"
          echo "needs.content-studio-cd-prod.result='${{ needs.content-studio-cd-prod.result }}'"
      - name: Notify Teams Chat
        if: ${{ needs.content-studio-cd-prod.result == 'failure' }}
        run: |
          cat > /tmp/card.json <<CARD
          {
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.3",
                  "body": [
                    { "type": "TextBlock", "size": "Medium", "weight": "Bolder", "text": "⚠️GitHub Actions Alert—$GITHUB_REPOSITORY" },
                    { "type": "TextBlock", "text": "Workflow: $PREVIOUS_JOB_NAME" },
                    { "type": "TextBlock", "text": "Deployment Tag: ${{ vars.TAG }}" },
                    { "type": "TextBlock", "text": "Target ENV: ${{ vars.ENVIRONMENT }}" },
                    { "type": "TextBlock", "text": "Status= $FINAL_STATUS_UPPER $EMOJI", "color": "$COLOR", "weight": "Bolder" },
                    { "type": "TextBlock", "text": "Commit: $GITHUB_SHA" }
                  ]
                }
              }
            ]
          }
          CARD

          curl -sS -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/card.json
          echo "STATUS=$STATUS COLOR=$COLOR"
          cat /tmp/card.json
